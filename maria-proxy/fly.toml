# fly.toml app configuration file generated for jendie-mariadb-proxy on 2026-04-09T11:41:07+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'jendie-mariadb-proxy'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 3306
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 3306

  [[services.ports]]
    port = 3306

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
